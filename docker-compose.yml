services:
  postgres:
    image: postgres:16-alpine
    container_name: petstore-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: petstore
      POSTGRES_USER: petstore
      POSTGRES_PASSWORD: petstore
    volumes:
      - petstore_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U petstore -d petstore"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  petstore_postgres_data:
